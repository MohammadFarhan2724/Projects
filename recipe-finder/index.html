<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recipe Finder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Segoe UI',sans-serif;background:#fff9f0;min-height:100vh;padding:2rem 1rem;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
function App(){
  const [query,setQuery]=useState('');
  const [recipes,setRecipes]=useState([]);
  const [loading,setLoading]=useState(false);
  const [selected,setSelected]=useState(null);
  const [detail,setDetail]=useState(null);
  const search=async()=>{
    if(!query.trim())return;
    setLoading(true);setRecipes([]);
    try{
      const res=await fetch(`https://www.themealdb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`);
      const data=await res.json();
      setRecipes(data.meals||[]);
    }catch(e){console.error(e);}
    setLoading(false);
  };
  const showDetail=async(id)=>{
    try{
      const res=await fetch(`https://www.themealdb.com/api/json/v1/1/lookup.php?i=${id}`);
      const data=await res.json();
      setDetail(data.meals[0]);setSelected(id);
    }catch(e){}
  };
  const getIngredients=(meal)=>{
    const list=[];
    for(let i=1;i<=20;i++){
      const ing=meal[`strIngredient${i}`];
      const meas=meal[`strMeasure${i}`];
      if(ing&&ing.trim())list.push({ing,meas:meas||''});
    }
    return list;
  };
  return(
    <div style={{maxWidth:900,margin:'0 auto'}}>
      <h1 style={{fontSize:'1.6rem',fontWeight:700,color:'#1a1a2e',marginBottom:4}}>🍽 Recipe Finder</h1>
      <p style={{fontSize:13,color:'#6b7280',marginBottom:'1.5rem'}}>Search thousands of recipes from MealDB</p>
      <div style={{display:'flex',gap:8,marginBottom:'1.5rem'}}>
        <input value={query} onChange={e=>setQuery(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()} placeholder="Search recipes (e.g. chicken, pasta)..." style={{flex:1,padding:'11px 16px',border:'1.5px solid #e5e7eb',borderRadius:12,fontSize:14,outline:'none'}}/>
        <button onClick={search} style={{padding:'11px 24px',background:'#e85d04',color:'#fff',border:'none',borderRadius:12,fontSize:14,fontWeight:600,cursor:'pointer'}}>Search</button>
      </div>
      {loading&&<p style={{color:'#9ca3af',textAlign:'center',padding:'2rem'}}>Searching recipes...</p>}
      {!loading&&recipes.length===0&&query&&<p style={{color:'#9ca3af',textAlign:'center',padding:'2rem'}}>No recipes found. Try another search.</p>}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:14}}>
        {recipes.map(r=>(
          <div key={r.idMeal} onClick={()=>showDetail(r.idMeal)} style={{background:'#fff',borderRadius:14,overflow:'hidden',border:'1.5px solid #f0f0f0',cursor:'pointer',transition:'transform 0.2s'}} onMouseOver={e=>e.currentTarget.style.transform='scale(1.03)'} onMouseOut={e=>e.currentTarget.style.transform='scale(1)'}>
            <img src={r.strMealThumb} alt={r.strMeal} style={{width:'100%',height:140,objectFit:'cover'}}/>
            <div style={{padding:'10px 12px'}}>
              <div style={{fontSize:13,fontWeight:600,color:'#1a1a2e',marginBottom:4}}>{r.strMeal}</div>
              <div style={{fontSize:11,color:'#9ca3af'}}>{r.strCategory} · {r.strArea}</div>
            </div>
          </div>
        ))}
      </div>
      {detail&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:100,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}} onClick={()=>setDetail(null)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:20,maxWidth:600,width:'100%',maxHeight:'85vh',overflowY:'auto'}}>
            <img src={detail.strMealThumb} alt={detail.strMeal} style={{width:'100%',height:200,objectFit:'cover',borderRadius:'20px 20px 0 0'}}/>
            <div style={{padding:'1.5rem'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'1rem'}}>
                <div><h2 style={{fontSize:'1.2rem',fontWeight:700,color:'#1a1a2e'}}>{detail.strMeal}</h2><p style={{fontSize:12,color:'#9ca3af',marginTop:2}}>{detail.strCategory} · {detail.strArea}</p></div>
                <button onClick={()=>setDetail(null)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:20}}>✕</button>
              </div>
              <h3 style={{fontSize:14,fontWeight:600,color:'#1a1a2e',marginBottom:8}}>Ingredients</h3>
              <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:'1rem'}}>
                {getIngredients(detail).map((item,i)=>(
                  <span key={i} style={{background:'#fff9f0',border:'1px solid #fed7aa',borderRadius:6,padding:'3px 10px',fontSize:12,color:'#9a3412'}}>{item.meas} {item.ing}</span>
                ))}
              </div>
              <h3 style={{fontSize:14,fontWeight:600,color:'#1a1a2e',marginBottom:8}}>Instructions</h3>
              <p style={{fontSize:13,color:'#374151',lineHeight:1.7}}>{detail.strInstructions?.substring(0,600)}...</p>
              {detail.strYoutube&&<a href={detail.strYoutube} target="_blank" style={{display:'inline-block',marginTop:'1rem',padding:'8px 18px',background:'#ef4444',color:'#fff',borderRadius:8,textDecoration:'none',fontSize:13,fontWeight:600}}>▶ Watch on YouTube</a>}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
