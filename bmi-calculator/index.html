<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BMI Calculator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:1rem;}
.card{background:#fff;border-radius:20px;padding:2rem;max-width:420px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
h1{font-size:1.4rem;font-weight:700;color:#1a1a2e;margin-bottom:0.3rem;}
.subtitle{font-size:13px;color:#6b7280;margin-bottom:1.5rem;}
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;}
.tab{flex:1;padding:8px;border:1.5px solid #e5e7eb;border-radius:8px;background:transparent;font-size:13px;cursor:pointer;transition:all 0.2s;}
.tab.active{background:#4f46e5;color:#fff;border-color:#4f46e5;}
.form-group{margin-bottom:1rem;}
label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:6px;}
input{width:100%;padding:10px 14px;border:1.5px solid #e5e7eb;border-radius:10px;font-size:14px;outline:none;transition:border-color 0.2s;}
input:focus{border-color:#4f46e5;}
.unit{font-size:12px;color:#9ca3af;margin-top:4px;}
button.calc-btn{width:100%;padding:12px;background:#4f46e5;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-top:0.5rem;transition:background 0.2s;}
button.calc-btn:hover{background:#4338ca;}
.result{margin-top:1.5rem;padding:1.5rem;border-radius:14px;text-align:center;display:none;}
.bmi-value{font-size:3rem;font-weight:300;margin-bottom:0.3rem;}
.bmi-label{font-size:1.1rem;font-weight:600;margin-bottom:1rem;}
.bmi-bar-wrap{background:#e5e7eb;border-radius:999px;height:8px;margin:1rem 0;position:relative;overflow:hidden;}
.bmi-bar{height:100%;border-radius:999px;transition:width 0.5s;}
.bmi-ranges{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:1rem;}
.range-item{font-size:11px;text-align:center;padding:6px 4px;border-radius:8px;}
.underweight{background:#dbeafe;color:#1e40af;}
.normal{background:#dcfce7;color:#166534;}
.overweight{background:#fef9c3;color:#854d0e;}
.obese{background:#fee2e2;color:#991b1b;}
</style>
</head>
<body>
<div class="card">
  <h1>⚖️ BMI Calculator</h1>
  <p class="subtitle">Calculate your Body Mass Index</p>
  <div class="tabs">
    <button class="tab active" onclick="setUnit('metric',this)">Metric (kg/cm)</button>
    <button class="tab" onclick="setUnit('imperial',this)">Imperial (lb/in)</button>
  </div>
  <div id="metric-inputs">
    <div class="form-group"><label>Weight (kg)</label><input type="number" id="weight-kg" placeholder="e.g. 70"/></div>
    <div class="form-group"><label>Height (cm)</label><input type="number" id="height-cm" placeholder="e.g. 175"/></div>
  </div>
  <div id="imperial-inputs" style="display:none;">
    <div class="form-group"><label>Weight (lbs)</label><input type="number" id="weight-lb" placeholder="e.g. 154"/></div>
    <div class="form-group"><label>Height (inches)</label><input type="number" id="height-in" placeholder="e.g. 69"/></div>
  </div>
  <button class="calc-btn" onclick="calcBMI()">Calculate BMI</button>
  <div class="result" id="result">
    <div class="bmi-value" id="bmi-val"></div>
    <div class="bmi-label" id="bmi-label"></div>
    <div class="bmi-bar-wrap"><div class="bmi-bar" id="bmi-bar"></div></div>
    <div class="bmi-ranges">
      <div class="range-item underweight">Underweight<br/>&lt;18.5</div>
      <div class="range-item normal">Normal<br/>18.5–24.9</div>
      <div class="range-item overweight">Overweight<br/>25–29.9</div>
      <div class="range-item obese">Obese<br/>≥30</div>
    </div>
  </div>
</div>
<script>
let unit='metric';
function setUnit(u,btn){unit=u;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');document.getElementById('metric-inputs').style.display=u==='metric'?'block':'none';document.getElementById('imperial-inputs').style.display=u==='imperial'?'block':'none';}
function calcBMI(){
  let w,h;
  if(unit==='metric'){w=parseFloat(document.getElementById('weight-kg').value);h=parseFloat(document.getElementById('height-cm').value)/100;}
  else{w=parseFloat(document.getElementById('weight-lb').value)*0.453592;h=parseFloat(document.getElementById('height-in').value)*0.0254;}
  if(!w||!h||w<=0||h<=0)return alert('Please enter valid values.');
  const bmi=w/(h*h);
  let label,color,barColor,pct;
  if(bmi<18.5){label='Underweight';color='#1e40af';barColor='#3b82f6';pct=Math.max(5,(bmi/18.5)*25);}
  else if(bmi<25){label='Normal Weight';color='#166534';barColor='#22c55e';pct=25+(bmi-18.5)/(25-18.5)*25;}
  else if(bmi<30){label='Overweight';color='#854d0e';barColor='#eab308';pct=50+(bmi-25)/(30-25)*25;}
  else{label='Obese';color='#991b1b';barColor='#ef4444';pct=Math.min(95,75+(bmi-30)/10*25);}
  document.getElementById('bmi-val').textContent=bmi.toFixed(1);
  document.getElementById('bmi-label').textContent=label;
  document.getElementById('bmi-label').style.color=color;
  document.getElementById('bmi-bar').style.width=pct+'%';
  document.getElementById('bmi-bar').style.background=barColor;
  document.getElementById('result').style.display='block';
}
</script>
</body>
</html>
