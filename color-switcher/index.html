<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Color Switcher</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:background 0.5s ease;background:#1a1a2e;padding:1rem;}
.card{background:rgba(255,255,255,0.15);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.25);border-radius:20px;padding:2.5rem 2rem;text-align:center;max-width:380px;width:100%;}
h1{color:#fff;font-size:1.4rem;font-weight:500;margin-bottom:0.5rem;}
.hex{font-size:2rem;font-weight:300;color:#fff;letter-spacing:0.1em;margin:1rem 0;}
.rgb{font-size:13px;color:rgba(255,255,255,0.7);margin-bottom:1.5rem;}
.btns{display:flex;flex-direction:column;gap:10px;}
button{padding:12px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:transform 0.15s,opacity 0.15s;}
button:active{transform:scale(0.96);}
.btn-random{background:rgba(255,255,255,0.9);color:#1a1a2e;}
.btn-random:hover{background:#fff;}
.palette{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:1.5rem;}
.swatch{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid rgba(255,255,255,0.3);transition:transform 0.15s;}
.swatch:hover{transform:scale(1.2);}
.copy-msg{font-size:12px;color:rgba(255,255,255,0.6);margin-top:1rem;min-height:18px;}
</style>
</head>
<body>
<div class="card">
  <h1>🎨 Color Switcher</h1>
  <div class="hex" id="hex">#1A1A2E</div>
  <div class="rgb" id="rgb">rgb(26, 26, 46)</div>
  <div class="btns">
    <button class="btn-random" onclick="randomColor()">Generate Random Color</button>
  </div>
  <div class="palette" id="palette"></div>
  <div class="copy-msg" id="copy-msg"></div>
</div>
<script>
let history=[];
function randomColor(){
  const r=Math.floor(Math.random()*256),g=Math.floor(Math.random()*256),b=Math.floor(Math.random()*256);
  const hex='#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();
  applyColor(hex,r,g,b);
  if(history.length>=10)history.shift();
  if(!history.includes(hex)){history.push(hex);renderPalette();}
}
function applyColor(hex,r,g,b){
  document.body.style.background=hex;
  document.getElementById('hex').textContent=hex;
  document.getElementById('rgb').textContent=`rgb(${r}, ${g}, ${b})`;
}
function renderPalette(){
  const el=document.getElementById('palette');
  el.innerHTML='';
  history.slice().reverse().forEach(c=>{
    const s=document.createElement('div');
    s.className='swatch';
    s.style.background=c;
    s.title=c;
    s.onclick=()=>{
      document.body.style.background=c;
      const r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
      document.getElementById('hex').textContent=c;
      document.getElementById('rgb').textContent=`rgb(${r}, ${g}, ${b})`;
    };
    el.appendChild(s);
  });
}
document.getElementById('hex').addEventListener('click',()=>{
  navigator.clipboard.writeText(document.getElementById('hex').textContent);
  document.getElementById('copy-msg').textContent='Copied to clipboard!';
  setTimeout(()=>document.getElementById('copy-msg').textContent='',2000);
});
randomColor();
</script>
</body>
</html>
