<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Markdown Previewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f8f9fa;height:100vh;display:flex;flex-direction:column;}
.preview-content h1,.preview-content h2,.preview-content h3{color:#1a1a2e;margin:1rem 0 0.5rem;font-weight:700;}
.preview-content h1{font-size:1.6rem;border-bottom:2px solid #e5e7eb;padding-bottom:6px;}
.preview-content h2{font-size:1.3rem;}
.preview-content p{margin-bottom:0.75rem;line-height:1.7;color:#374151;}
.preview-content code{background:#f3f4f6;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px;color:#4f46e5;}
.preview-content pre{background:#1a1a2e;color:#e2e8f0;padding:1rem;border-radius:10px;overflow-x:auto;margin-bottom:1rem;}
.preview-content pre code{background:none;color:inherit;padding:0;}
.preview-content blockquote{border-left:4px solid #4f46e5;padding-left:1rem;color:#6b7280;font-style:italic;margin-bottom:1rem;}
.preview-content ul,.preview-content ol{padding-left:1.5rem;margin-bottom:0.75rem;}
.preview-content li{margin-bottom:4px;color:#374151;}
.preview-content a{color:#4f46e5;text-decoration:underline;}
.preview-content strong{font-weight:700;color:#1a1a2e;}
.preview-content hr{border:none;border-top:1px solid #e5e7eb;margin:1.5rem 0;}
</style>
</head>
<body>
<div id="root" style={{height:'100vh'}}></div>
<script type="text/babel">
const {useState}=React;
const defaultMd=`# Markdown Previewer

## What is Markdown?
Markdown is a **lightweight markup language** that converts plain text to formatted HTML.

## Features
- *Italic text* and **bold text**
- Inline \`code snippets\`
- [Hyperlinks](https://github.com)

## Code Block
\`\`\`javascript
function greet(name) {
  return \`Hello, \${name}!\`;
}
console.log(greet("Farhan"));
\`\`\`

## Blockquote
> "The best way to learn to code is to build things."

## Table-like List
1. HTML — Structure
2. CSS — Style
3. JavaScript — Behaviour

---
*Start editing on the left to see your changes instantly!*
`;
function App(){
  const [md,setMd]=useState(defaultMd);
  const [view,setView]=useState('both');
  const html=marked.parse(md);
  return(
    <div style={{display:'flex',flexDirection:'column',height:'100vh'}}>
      <div style={{background:'#fff',borderBottom:'1px solid #e5e7eb',padding:'0.75rem 1.5rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <h1 style={{fontSize:'1rem',fontWeight:700,color:'#1a1a2e'}}>📝 Markdown Previewer</h1>
        <div style={{display:'flex',gap:6}}>
          {['editor','both','preview'].map(v=>(
            <button key={v} onClick={()=>setView(v)} style={{padding:'5px 12px',border:'1.5px solid',borderColor:view===v?'#4f46e5':'#e5e7eb',borderRadius:8,background:view===v?'#4f46e5':'transparent',color:view===v?'#fff':'#666',fontSize:12,fontWeight:600,cursor:'pointer',textTransform:'capitalize'}}>{v}</button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',flex:1,overflow:'hidden'}}>
        {(view==='editor'||view==='both')&&(
          <div style={{flex:1,display:'flex',flexDirection:'column',borderRight:'1px solid #e5e7eb'}}>
            <div style={{padding:'8px 16px',background:'#f8f9fa',borderBottom:'1px solid #e5e7eb',fontSize:12,color:'#6b7280',fontWeight:600}}>EDITOR</div>
            <textarea value={md} onChange={e=>setMd(e.target.value)} style={{flex:1,padding:'1rem 1.5rem',border:'none',outline:'none',fontFamily:'monospace',fontSize:14,lineHeight:1.7,resize:'none',background:'#fff',color:'#374151'}}/>
          </div>
        )}
        {(view==='preview'||view==='both')&&(
          <div style={{flex:1,overflow:'auto'}}>
            <div style={{padding:'8px 16px',background:'#f8f9fa',borderBottom:'1px solid #e5e7eb',fontSize:12,color:'#6b7280',fontWeight:600}}>PREVIEW</div>
            <div className="preview-content" style={{padding:'1.5rem'}} dangerouslySetInnerHTML={{__html:html}}/>
          </div>
        )}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
