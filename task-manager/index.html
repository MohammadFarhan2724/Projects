<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Task Manager</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;padding:2rem 1rem;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;
const PRIORITIES={high:{label:'High',color:'#fee2e2',text:'#991b1b',dot:'#ef4444'},medium:{label:'Medium',color:'#fef9c3',text:'#854d0e',dot:'#eab308'},low:{label:'Low',color:'#dcfce7',text:'#166534',dot:'#22c55e'}};
function App(){
  const [tasks,setTasks]=useState([
    {id:1,title:'Build portfolio website',priority:'high',due:'2025-06-01',done:false},
    {id:2,title:'Push projects to GitHub',priority:'medium',due:'2025-05-25',done:false},
    {id:3,title:'Update LinkedIn profile',priority:'low',due:'2025-05-30',done:true},
  ]);
  const [filter,setFilter]=useState('all');
  const [modal,setModal]=useState(false);
  const [form,setForm]=useState({title:'',priority:'medium',due:''});
  const filtered=useMemo(()=>tasks.filter(t=>filter==='all'?true:filter==='done'?t.done:!t.done),[tasks,filter]);
  const add=()=>{if(!form.title.trim())return;setTasks(p=>[...p,{id:Date.now(),...form,done:false}]);setForm({title:'',priority:'medium',due:''});setModal(false);};
  const toggle=id=>setTasks(p=>p.map(t=>t.id===id?{...t,done:!t.done}:t));
  const remove=id=>setTasks(p=>p.filter(t=>t.id!==id));
  const done=tasks.filter(t=>t.done).length;
  return(
    <div style={{maxWidth:520,margin:'0 auto'}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.5rem'}}>
        <div><h1 style={{fontSize:'1.4rem',fontWeight:700,color:'#1a1a2e'}}>📋 Task Manager</h1><p style={{fontSize:13,color:'#6b7280',marginTop:2}}>{done}/{tasks.length} completed</p></div>
        <button onClick={()=>setModal(true)} style={{padding:'9px 18px',background:'#4f46e5',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer'}}>+ Add Task</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:'1.2rem'}}>
        {['all','active','done'].map(f=>(
          <button key={f} onClick={()=>setFilter(f)} style={{padding:'5px 14px',border:'1.5px solid',borderColor:filter===f?'#4f46e5':'#e5e7eb',borderRadius:999,background:filter===f?'#4f46e5':'transparent',color:filter===f?'#fff':'#666',fontSize:13,cursor:'pointer',textTransform:'capitalize'}}>{f}</button>
        ))}
      </div>
      {filtered.length===0&&<div style={{textAlign:'center',color:'#9ca3af',padding:'2rem',background:'#fff',borderRadius:14}}>No tasks here.</div>}
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {filtered.map(t=>{
          const p=PRIORITIES[t.priority];
          return(
            <div key={t.id} style={{background:'#fff',borderRadius:14,padding:'14px 16px',border:'1.5px solid #f0f0f0',display:'flex',alignItems:'center',gap:12,opacity:t.done?0.6:1}}>
              <input type="checkbox" checked={t.done} onChange={()=>toggle(t.id)} style={{width:17,height:17,accentColor:'#4f46e5',cursor:'pointer',flexShrink:0}}/>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:500,color:'#1a1a2e',textDecoration:t.done?'line-through':'none'}}>{t.title}</div>
                <div style={{display:'flex',gap:6,marginTop:4,alignItems:'center'}}>
                  <span style={{background:p.color,color:p.text,fontSize:11,padding:'2px 8px',borderRadius:6,fontWeight:600}}>{p.label}</span>
                  {t.due&&<span style={{fontSize:11,color:'#9ca3af'}}>Due: {t.due}</span>}
                </div>
              </div>
              <button onClick={()=>remove(t.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#d1d5db',fontSize:16}} onMouseOver={e=>e.target.style.color='#ef4444'} onMouseOut={e=>e.target.style.color='#d1d5db'}>✕</button>
            </div>
          );
        })}
      </div>
      {modal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem',zIndex:100}}>
          <div style={{background:'#fff',borderRadius:16,padding:'1.5rem',width:'100%',maxWidth:400}}>
            <h2 style={{fontSize:'1rem',fontWeight:700,color:'#1a1a2e',marginBottom:'1rem'}}>New Task</h2>
            <div style={{display:'flex',flexDirection:'column',gap:10}}>
              <input value={form.title} onChange={e=>setForm(p=>({...p,title:e.target.value}))} placeholder="Task title" style={{padding:'10px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontSize:14,outline:'none'}}/>
              <select value={form.priority} onChange={e=>setForm(p=>({...p,priority:e.target.value}))} style={{padding:'10px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontSize:14,outline:'none'}}>
                <option value="high">High Priority</option>
                <option value="medium">Medium Priority</option>
                <option value="low">Low Priority</option>
              </select>
              <input type="date" value={form.due} onChange={e=>setForm(p=>({...p,due:e.target.value}))} style={{padding:'10px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontSize:14,outline:'none'}}/>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>setModal(false)} style={{flex:1,padding:'10px',background:'#f3f4f6',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer'}}>Cancel</button>
                <button onClick={add} style={{flex:1,padding:'10px',background:'#4f46e5',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer'}}>Add</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
