<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 2rem;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 1.5rem;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      padding: 10px 18px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-row button:hover { background: #4338ca; }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 1.2rem;
    }

    .filters button {
      padding: 5px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 999px;
      background: transparent;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filters button.active {
      background: #4f46e5;
      color: #fff;
      border-color: #4f46e5;
    }

    .todo-list { display: flex; flex-direction: column; gap: 8px; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border: 1.5px solid #f0f0f0;
      border-radius: 10px;
      background: #fafafa;
      transition: border-color 0.2s;
    }

    .todo-item:hover { border-color: #d0d0e0; }

    .todo-item input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-item span {
      flex: 1;
      font-size: 14px;
      color: #333;
    }

    .todo-item span.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-item .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 18px;
      line-height: 1;
      padding: 0 2px;
      transition: color 0.15s;
    }

    .todo-item .del-btn:hover { color: #e53e3e; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 2rem 0;
    }

    .stats {
      font-size: 12px;
      color: #aaa;
      text-align: right;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 To-Do List</h1>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="Add a new task..." maxlength="100" />
      <button onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="active" onclick="setFilter('all', this)">All</button>
      <button onclick="setFilter('active', this)">Active</button>
      <button onclick="setFilter('done', this)">Done</button>
    </div>

    <div class="todo-list" id="todo-list"></div>
    <p class="empty" id="empty-msg" style="display:none;">No tasks here.</p>
    <p class="stats" id="stats"></p>
  </div>

  <script>
    let tasks = [];
    let filter = 'all';
    let nextId = 1;

    function render() {
      const list = document.getElementById('todo-list');
      const emptyMsg = document.getElementById('empty-msg');
      const stats = document.getElementById('stats');

      const visible = tasks.filter(t =>
        filter === 'all' ? true : filter === 'done' ? t.done : !t.done
      );

      list.innerHTML = '';

      if (visible.length === 0) {
        emptyMsg.style.display = 'block';
      } else {
        emptyMsg.style.display = 'none';
        visible.forEach(t => {
          const item = document.createElement('div');
          item.className = 'todo-item';
          item.innerHTML = `
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})" />
            <span class="${t.done ? 'done' : ''}">${t.text}</span>
            <button class="del-btn" onclick="remove(${t.id})" title="Delete">✕</button>
          `;
          list.appendChild(item);
        });
      }

      const done = tasks.filter(t => t.done).length;
      stats.textContent = tasks.length ? `${done} of ${tasks.length} completed` : '';
    }

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;
      tasks.unshift({ id: nextId++, text, done: false });
      input.value = '';
      render();
    }

    function toggle(id) {
      tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
      render();
    }

    function remove(id) {
      tasks = tasks.filter(t => t.id !== id);
      render();
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    document.getElementById('task-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
