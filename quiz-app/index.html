<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0c29;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .progress-bar-wrap {
      background: #f0f0f0;
      border-radius: 999px;
      height: 6px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: #4f46e5;
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    .question-count {
      font-size: 12px;
      color: #999;
      margin-bottom: 0.5rem;
    }

    .question-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .options { display: flex; flex-direction: column; gap: 10px; }

    .option-btn {
      padding: 12px 16px;
      border: 2px solid #e8e8f0;
      border-radius: 12px;
      background: #fafafa;
      font-size: 14px;
      color: #333;
      text-align: left;
      cursor: pointer;
      transition: all 0.18s;
    }

    .option-btn:hover:not(:disabled) {
      border-color: #4f46e5;
      background: #f0f0ff;
    }

    .option-btn.correct {
      border-color: #22c55e;
      background: #f0fdf4;
      color: #166534;
      font-weight: 600;
    }

    .option-btn.wrong {
      border-color: #ef4444;
      background: #fef2f2;
      color: #991b1b;
    }

    .option-btn:disabled { cursor: default; }

    .feedback {
      margin-top: 1rem;
      font-size: 13px;
      min-height: 20px;
      color: #555;
    }

    .next-btn {
      margin-top: 1.5rem;
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: none;
      transition: background 0.2s;
    }

    .next-btn:hover { background: #4338ca; }

    /* Result screen */
    .result { text-align: center; }
    .result .score { font-size: 3.5rem; font-weight: 700; color: #4f46e5; margin: 1rem 0 0.5rem; }
    .result .score-label { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    .result .message { font-size: 1rem; color: #444; margin-bottom: 2rem; }
    .result .restart-btn {
      padding: 12px 32px;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    .result .restart-btn:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="card" id="quiz-card">
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <p class="question-count" id="question-count"></p>
    <p class="question-text" id="question-text"></p>
    <div class="options" id="options"></div>
    <p class="feedback" id="feedback"></p>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
  </div>

  <script>
    const questions = [
      {
        question: "What does HTML stand for?",
        options: ["Hyper Text Markup Language", "High Text Machine Language", "Hyperlink and Text Markup Language", "Home Tool Markup Language"],
        answer: 0,
        explanation: "HTML stands for Hyper Text Markup Language."
      },
      {
        question: "Which CSS property is used to change the text color?",
        options: ["font-color", "text-color", "color", "background-color"],
        answer: 2,
        explanation: "The 'color' property sets the text color in CSS."
      },
      {
        question: "Which JavaScript method is used to select an element by its ID?",
        options: ["querySelector()", "getElementById()", "getElementByClass()", "selectById()"],
        answer: 1,
        explanation: "document.getElementById() selects an HTML element by its ID."
      },
      {
        question: "What is the correct way to write a comment in JavaScript?",
        options: ["<!-- comment -->", "** comment **", "// comment", "## comment"],
        answer: 2,
        explanation: "// is used for single-line comments in JavaScript."
      },
      {
        question: "Which HTML tag is used to link an external CSS file?",
        options: ["<style>", "<script>", "<css>", "<link>"],
        answer: 3,
        explanation: "The <link> tag with rel='stylesheet' links an external CSS file."
      },
      {
        question: "Which CSS property controls the space between elements?",
        options: ["spacing", "margin", "border", "indent"],
        answer: 1,
        explanation: "The 'margin' property controls the space outside an element."
      },
      {
        question: "What does the 'display: flex' CSS property do?",
        options: ["Makes elements invisible", "Enables flexbox layout", "Fixes element position", "Changes font size"],
        answer: 1,
        explanation: "display: flex enables the flexbox layout model for a container."
      },
      {
        question: "Which JavaScript keyword is used to declare a variable that cannot be reassigned?",
        options: ["var", "let", "static", "const"],
        answer: 3,
        explanation: "'const' declares a variable that cannot be reassigned after declaration."
      }
    ];

    let current = 0;
    let score = 0;
    let answered = false;

    function loadQuestion() {
      answered = false;
      const q = questions[current];
      const total = questions.length;

      document.getElementById('progress-bar').style.width = ((current / total) * 100) + '%';
      document.getElementById('question-count').textContent = `Question ${current + 1} of ${total}`;
      document.getElementById('question-text').textContent = q.question;
      document.getElementById('feedback').textContent = '';
      document.getElementById('next-btn').style.display = 'none';

      const optionsEl = document.getElementById('options');
      optionsEl.innerHTML = '';
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt;
        btn.onclick = () => selectAnswer(i);
        optionsEl.appendChild(btn);
      });
    }

    function selectAnswer(index) {
      if (answered) return;
      answered = true;

      const q = questions[current];
      const buttons = document.querySelectorAll('.option-btn');

      buttons.forEach(btn => btn.disabled = true);
      buttons[q.answer].classList.add('correct');

      if (index === q.answer) {
        score++;
        document.getElementById('feedback').textContent = '✅ Correct! ' + q.explanation;
      } else {
        buttons[index].classList.add('wrong');
        document.getElementById('feedback').textContent = '❌ Wrong. ' + q.explanation;
      }

      document.getElementById('next-btn').style.display = 'block';
      document.getElementById('next-btn').textContent = current === questions.length - 1 ? 'See Results' : 'Next →';
    }

    function nextQuestion() {
      current++;
      if (current < questions.length) {
        loadQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const total = questions.length;
      const pct = Math.round((score / total) * 100);
      let message = '';
      if (pct === 100) message = '🏆 Perfect score! Outstanding!';
      else if (pct >= 75) message = '🎉 Great job! You know your stuff.';
      else if (pct >= 50) message = '👍 Good effort! Keep practicing.';
      else message = '📚 Keep learning — you\'ll get there!';

      document.getElementById('quiz-card').innerHTML = `
        <div class="result">
          <p style="font-size:1.1rem; font-weight:600; color:#1a1a2e;">Quiz Complete!</p>
          <p class="score">${score}/${total}</p>
          <p class="score-label">${pct}% correct</p>
          <p class="message">${message}</p>
          <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
        </div>
      `;
    }

    function restartQuiz() {
      current = 0;
      score = 0;
      document.getElementById('quiz-card').innerHTML = `
        <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
        <p class="question-count" id="question-count"></p>
        <p class="question-text" id="question-text"></p>
        <div class="options" id="options"></div>
        <p class="feedback" id="feedback"></p>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Next →</button>
      `;
      loadQuestion();
    }

    loadQuestion();
  </script>
</body>
</html>
