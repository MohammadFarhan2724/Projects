<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Shop</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Segoe UI',sans-serif;background:#f8f9fa;min-height:100vh;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo}=React;
const products=[
  {id:1,name:'Wireless Noise-Cancelling Headphones',price:2999,category:'Electronics',rating:4.5,reviews:128,badge:'Best Seller',desc:'Premium sound quality with 30hr battery life.',img:'https://via.placeholder.com/300x200/1a1a2e/fff?text=Headphones'},
  {id:2,name:'Mechanical Keyboard',price:4499,category:'Electronics',rating:4.7,reviews:89,badge:'New',desc:'RGB backlit, tactile switches, full NKRO.',img:'https://via.placeholder.com/300x200/4f46e5/fff?text=Keyboard'},
  {id:3,name:'Running Shoes',price:1999,category:'Fashion',rating:4.3,reviews:211,badge:'',desc:'Lightweight, breathable, perfect for long runs.',img:'https://via.placeholder.com/300x200/0d9488/fff?text=Shoes'},
  {id:4,name:'Stainless Steel Bottle',price:599,category:'Home',rating:4.6,reviews:305,badge:'',desc:'Keeps drinks cold for 24h, hot for 12h.',img:'https://via.placeholder.com/300x200/0284c7/fff?text=Bottle'},
  {id:5,name:'Desk Lamp with USB',price:899,category:'Home',rating:4.4,reviews:76,badge:'',desc:'Touch dimmer, 3 color modes, USB charging port.',img:'https://via.placeholder.com/300x200/b45309/fff?text=Lamp'},
  {id:6,name:'Backpack 30L',price:1499,category:'Fashion',rating:4.2,reviews:143,badge:'Sale',desc:'Waterproof, laptop compartment, ergonomic straps.',img:'https://via.placeholder.com/300x200/7c3aed/fff?text=Backpack'},
  {id:7,name:'Bluetooth Speaker',price:1299,category:'Electronics',rating:4.4,reviews:98,badge:'',desc:'360° surround sound, waterproof IPX5, 12h battery.',img:'https://via.placeholder.com/300x200/be123c/fff?text=Speaker'},
  {id:8,name:'Yoga Mat',price:699,category:'Home',rating:4.1,reviews:57,badge:'',desc:'Non-slip, eco-friendly, 6mm thick with carry strap.',img:'https://via.placeholder.com/300x200/15803d/fff?text=Yoga+Mat'},
];
const CATS=['All','Electronics','Fashion','Home'];
function Stars({rating}){return(<span style={{color:'#eab308',fontSize:13}}>{'★'.repeat(Math.floor(rating))}{'☆'.repeat(5-Math.floor(rating))} <span style={{color:'#6b7280'}}>{rating}</span></span>);}
function App(){
  const [cat,setCat]=useState('All');
  const [sort,setSort]=useState('default');
  const [cart,setCart]=useState([]);
  const [cartOpen,setCartOpen]=useState(false);
  const [search,setSearch]=useState('');
  const filtered=useMemo(()=>{
    let p=cat==='All'?products:products.filter(x=>x.category===cat);
    if(search)p=p.filter(x=>x.name.toLowerCase().includes(search.toLowerCase()));
    if(sort==='low')p=[...p].sort((a,b)=>a.price-b.price);
    if(sort==='high')p=[...p].sort((a,b)=>b.price-a.price);
    if(sort==='rating')p=[...p].sort((a,b)=>b.rating-a.rating);
    return p;
  },[cat,sort,search]);
  const addToCart=p=>{setCart(c=>{const ex=c.find(x=>x.id===p.id);return ex?c.map(x=>x.id===p.id?{...x,qty:x.qty+1}:x):[...c,{...p,qty:1}];});};
  const removeFromCart=id=>setCart(c=>c.filter(x=>x.id!==id));
  const total=cart.reduce((s,x)=>s+x.price*x.qty,0);
  const cartCount=cart.reduce((s,x)=>s+x.qty,0);
  return(
    <div>
      <div style={{background:'#fff',borderBottom:'1px solid #e5e7eb',padding:'1rem 2rem',position:'sticky',top:0,zIndex:10}}>
        <div style={{maxWidth:960,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
          <h1 style={{fontSize:'1.2rem',fontWeight:700,color:'#1a1a2e'}}>🛍 Shop</h1>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search products..." style={{flex:1,minWidth:160,padding:'8px 14px',border:'1.5px solid #e5e7eb',borderRadius:10,fontSize:14,outline:'none'}}/>
          <button onClick={()=>setCartOpen(true)} style={{padding:'8px 16px',background:'#1a1a2e',color:'#fff',border:'none',borderRadius:10,fontSize:13,fontWeight:600,cursor:'pointer',position:'relative'}}>
            🛒 Cart {cartCount>0&&<span style={{background:'#ef4444',color:'#fff',borderRadius:999,padding:'1px 6px',fontSize:11,marginLeft:4}}>{cartCount}</span>}
          </button>
        </div>
      </div>
      <div style={{maxWidth:960,margin:'0 auto',padding:'1.5rem 1rem'}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:'1rem',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{padding:'5px 14px',border:'1.5px solid',borderColor:cat===c?'#4f46e5':'#e5e7eb',borderRadius:999,background:cat===c?'#4f46e5':'transparent',color:cat===c?'#fff':'#666',fontSize:12,fontWeight:600,cursor:'pointer'}}>{c}</button>)}
          </div>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{padding:'6px 12px',border:'1.5px solid #e5e7eb',borderRadius:8,fontSize:13,outline:'none'}}>
            <option value="default">Sort: Default</option>
            <option value="low">Price: Low to High</option>
            <option value="high">Price: High to Low</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(210px,1fr))',gap:14}}>
          {filtered.map(p=>(
            <div key={p.id} style={{background:'#fff',borderRadius:14,overflow:'hidden',border:'1.5px solid #f0f0f0',transition:'box-shadow 0.2s'}} onMouseOver={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.08)'} onMouseOut={e=>e.currentTarget.style.boxShadow='none'}>
              <div style={{position:'relative'}}>
                <img src={p.img} alt={p.name} style={{width:'100%',height:150,objectFit:'cover'}}/>
                {p.badge&&<span style={{position:'absolute',top:8,left:8,background:p.badge==='Sale'?'#ef4444':p.badge==='New'?'#22c55e':'#4f46e5',color:'#fff',fontSize:11,fontWeight:700,padding:'3px 9px',borderRadius:6}}>{p.badge}</span>}
              </div>
              <div style={{padding:'12px'}}>
                <div style={{fontSize:13,fontWeight:600,color:'#1a1a2e',marginBottom:4,lineHeight:1.3}}>{p.name}</div>
                <div style={{marginBottom:4}}><Stars rating={p.rating}/> <span style={{fontSize:11,color:'#9ca3af'}}>({p.reviews})</span></div>
                <div style={{fontSize:12,color:'#6b7280',marginBottom:10}}>{p.desc}</div>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:'1rem',fontWeight:700,color:'#1a1a2e'}}>₹{p.price.toLocaleString()}</span>
                  <button onClick={()=>addToCart(p)} style={{padding:'6px 14px',background:'#4f46e5',color:'#fff',border:'none',borderRadius:8,fontSize:12,fontWeight:600,cursor:'pointer'}}>Add</button>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
      {cartOpen&&(
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:100,display:'flex',alignItems:'flex-start',justifyContent:'flex-end'}} onClick={()=>setCartOpen(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:'#fff',width:'100%',maxWidth:360,height:'100vh',padding:'1.5rem',overflowY:'auto',display:'flex',flexDirection:'column'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
              <h2 style={{fontSize:'1rem',fontWeight:700,color:'#1a1a2e'}}>Your Cart ({cartCount})</h2>
              <button onClick={()=>setCartOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',fontSize:20}}>✕</button>
            </div>
            {cart.length===0&&<p style={{color:'#9ca3af',textAlign:'center',padding:'2rem'}}>Your cart is empty.</p>}
            <div style={{flex:1}}>
              {cart.map(item=>(
                <div key={item.id} style={{display:'flex',gap:10,marginBottom:12,padding:'10px',background:'#f8f9fa',borderRadius:10}}>
                  <img src={item.img} alt="" style={{width:60,height:60,borderRadius:8,objectFit:'cover'}}/>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:'#1a1a2e'}}>{item.name}</div>
                    <div style={{fontSize:12,color:'#6b7280',marginTop:2}}>Qty: {item.qty} · ₹{(item.price*item.qty).toLocaleString()}</div>
                  </div>
                  <button onClick={()=>removeFromCart(item.id)} style={{background:'none',border:'none',cursor:'pointer',color:'#9ca3af',alignSelf:'flex-start'}}>✕</button>
                </div>
              ))}
            </div>
            {cart.length>0&&(
              <div style={{borderTop:'1px solid #e5e7eb',paddingTop:'1rem'}}>
                <div style={{display:'flex',justifyContent:'space-between',fontWeight:700,fontSize:'1rem',color:'#1a1a2e',marginBottom:'1rem'}}>
                  <span>Total</span><span>₹{total.toLocaleString()}</span>
                </div>
                <button style={{width:'100%',padding:12,background:'#4f46e5',color:'#fff',border:'none',borderRadius:10,fontSize:14,fontWeight:600,cursor:'pointer'}}>Checkout</button>
              </div>
            )}
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
